services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: evenstocks_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./evenstocks-api/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  evenstocks-api:
    build:
      context: ./evenstocks-api
    depends_on:
      - mysql
    ports:
      - '5809:5809'
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: example
      SENDER_EMAIL: ${SENDER_EMAIL}
      SENDER_PASSWORD: ${SENDER_PASSWORD}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    volumes:
      - ./evenstocks-api:/app

  evenstocks-backend:
    build:
      context: ./evenstocks-backend
    depends_on:
      - evenstocks-api
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      EXTERNAL_API_BASE: http://evenstocks-api:5809/api
      ANALYZE_API_BASE: http://evenstocks-analyze:5808
      AGENTS_API_BASE: http://evenstocks-agents:5810
    volumes:
      - ./evenstocks-backend:/app

  evenstocks-agents:
    build:
      context: ./evenstocks-agents
    ports:
      - '5810:5810'
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEP_MODEL: claude-sonnet-4-6
      QUICK_MODEL: claude-haiku-4-5-20251001
      STOCKS_DB_PATH: /app/data/stocks.db
      VERDICT_DB_PATH: /app/data/verdicts.db
    volumes:
      - ./evenstocks-agents:/app
      - ./evenstocks_chatbot/data:/app/data

  evenstocks-chatbot:
    build:
      context: ./evenstocks_chatbot
    depends_on:
      - mysql
    ports:
      - '8000:8000'
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HOST: 0.0.0.0
      PORT: 8000
      MODEL: claude-sonnet-4-20250514
      MAX_TOKENS: 2048
    volumes:
      - ./evenstocks_chatbot:/app

  evenstocks-scapping:
    build:
      context: ./evenstocks-scapping
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: example
    volumes:
      - ./evenstocks-scapping:/app
      - ./evenstocks_chatbot/data:/app/data
    command: ["python", "get_all_stocks_list.py"]
    profiles:
      - scraping

  frontend:
    build:
      context: ./evenstocks-react
    ports:
      - '3000:3000'
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: 'true'
      GENERATE_SOURCEMAP: 'false'
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_CHATBOT_WS_URL: ws://localhost:8000
    stdin_open: true
    tty: true
    depends_on:
      - evenstocks-backend
      - evenstocks-chatbot
      - evenstocks-agents
    volumes:
      - ./evenstocks-react:/app
      - /app/node_modules

volumes:
  db_data:
